services:
  # Your FastAPI backend
  api:
    build: .
    container_name: memehub_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always

  # Redis cache/broker
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    volumes:
      - redis_data:/data

volumes:
  redis_data: